name: Keep Workflows Alive

# Prevents GitHub from auto-disabling the scheduled "Cleanup Old Artifacts"
# workflow in this repo. GitHub disables schedule-triggered workflows after
# 60 days with no commits to the default branch. This repo normally stays
# active via artifact pushes from rsmedstad/qa-automation-tool, but that is a
# fragile dependency: if that pipeline pauses, this repo would go idle and the
# cleanup workflow would be disabled. This job runs daily and, only when the
# most recent commit is older than 50 days, pushes a tiny empty commit to
# reset the 60-day inactivity clock.

on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC (off the hour to avoid congestion)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Push empty commit if near the 60-day inactivity limit
        run: |
          last_commit_epoch=$(git log -1 --format=%ct)
          now_epoch=$(date +%s)
          days_idle=$(( (now_epoch - last_commit_epoch) / 86400 ))
          echo "Days since last commit: $days_idle"
          if [ "$days_idle" -ge 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keepalive to prevent scheduled workflow auto-disable [skip ci]"
            git push
          else
            echo "Repo active within 50 days; no keepalive commit needed."
          fi
